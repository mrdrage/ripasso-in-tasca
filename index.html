<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#faf9f6" />
    <meta name="description" content="Testi e quiz di Storia e Geografia, disponibili anche offline." />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
    <title>Ripasso in Tasca</title>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Vai al contenuto</a>

    <header class="topbar">
      <button class="brand" type="button" data-route="home" aria-label="Torna alla home">
        <span class="brand-mark" aria-hidden="true">R</span>
        <span>
          <strong>Ripasso in Tasca</strong>
          <small>Storia e Geografia</small>
        </span>
      </button>
      <button id="install-button" class="button button-quiet install-button" type="button" hidden>
        Installa
      </button>
    </header>

    <main id="main-content" tabindex="-1">
      <section id="view-home" class="view"></section>
      <section id="view-review" class="view" hidden></section>
      <section id="view-article" class="view" hidden></section>
      <section id="view-quiz" class="view" hidden></section>
      <section id="view-results" class="view" hidden></section>
    </main>

    <nav class="bottom-nav" aria-label="Navigazione principale">
      <button type="button" data-route="home" aria-current="page">
        <span aria-hidden="true">⌂</span>
        <small>Home</small>
      </button>
      <button type="button" data-route="review">
        <span aria-hidden="true">▤</span>
        <small>Ripassa</small>
      </button>
      <button type="button" data-route="quiz">
        <span aria-hidden="true">◆</span>
        <small>Quiz</small>
      </button>
      <button type="button" data-route="results">
        <span aria-hidden="true">◒</span>
        <small>Risultati</small>
      </button>
    </nav>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="content.js"></script>
    <script src="quiz-extra.js"></script>
    <script src="quiz-double.js"></script>
    <script src="history-full.js"></script>
    <script src="geography-full.js"></script>
    <script src="question-difficulty.js"></script>
    <script src="app.js"></script>
  </body>
</html>
